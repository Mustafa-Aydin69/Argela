# Tüm sistemi ayağa kaldıran dosya. İçerisinde şuan 7 adet servis var. "docker-compose up --build" komutu ile tüm sistemi ayağa kaldırabiliyoruz.
# postgres(alarm kayıtlarını tutuyorum veritabanı), jaeger( trace kayıtlarını görselleştirdiğimiz arayüz), prometheus(metrikleri topladığımız yer)
# grafana (metrikleri görselleştirilen arayüz), otel-collector (OpenTelemetry Collector, tüm telemetri verisinin toplandığı, işlendiği ve yönlendirildiği merkezi havuz),
# fault-collector (alarm verilerini toplayan servis, modül), fault-processor(alarm verilerini işleyen, analiz eden ve sonuçları döndüren servis, modül)
# Bu dosya olmadan hiçbir servis birbirini bulamaz. Otel entegrasyonu açısınından kritik olan iki şeyi burada tanımlamamız lazım:
# Uygulama servislerine  Otel env var'larını burada veriyoruz ki otel-agent nereye veri göndereceğini bu değişkenlerden öğreniyor. 
# Otel Collector ve Jaeger'i ayağa burada kaldırıyoruz ki uygulama servisleri otel-collector'ı bulabilsin ve otel-collector da jaeger'i bulabilsin.
services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: fault-postgres
    environment:
      POSTGRES_DB: faultdb
      POSTGRES_USER: fault_user
      POSTGRES_PASSWORD: fault_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fault_user -d faultdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC (OTel Collector → Jaeger)

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.92.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infrastructure/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver
      - "8889:8889"  # Prometheus scrape endpoint
      - "8888:8888"  # Collector self-metrics
    depends_on:
      - jaeger

  # ─── Application Services ─────────────────────────────────────────────────

  fault-processor:
    build:
      context: .
      dockerfile: fault-processor/Dockerfile
    container_name: fault-processor
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/faultdb
      - SPRING_DATASOURCE_USERNAME=fault_user
      - SPRING_DATASOURCE_PASSWORD=fault_pass
      - OTEL_SERVICE_NAME=fault-processor
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_METRIC_EXPORT_INTERVAL=10000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  fault-collector:
    build:
      context: .
      dockerfile: fault-collector/Dockerfile
    container_name: fault-collector
    ports:
      - "8080:8080"
    environment:
      - PROCESSOR_BASE_URL=http://fault-processor:8081
      - OTEL_SERVICE_NAME=fault-collector
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_METRIC_EXPORT_INTERVAL=10000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      fault-processor:
        condition: service_healthy
      otel-collector:
        condition: service_started

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
