version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fault-postgres
    environment:
      POSTGRES_DB: faultdb
      POSTGRES_USER: fault_user
      POSTGRES_PASSWORD: fault_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fault_user -d faultdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
